version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shop_postgres
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - shop_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop_backend
    environment:
      DATABASE_URL: postgresql://shopuser:${DB_PASSWORD:-changeme123}@postgres:5432/shopdb
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - shop_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shop_frontend
    environment:
      REACT_APP_API_URL: http://localhost:3001
    ports:
      - "3006:80"
    depends_on:
      - backend
    networks:
      - shop_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  shop_network:
    driver: bridge
